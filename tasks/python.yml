---
- name: Install Python pip and venv packages
  ansible.builtin.apt:
    name:
      - python3-pip
      - python3-venv
    state: present

- name: Install pipx via pip
  become: false
  ansible.builtin.pip:
    name: pipx
    virtualenv: /home/{{ ansible_user }}/.local/share/pipx-venv
    virtualenv_command: python3 -m venv

- name: Create pipx symlink
  become: false
  ansible.builtin.file:
    src: /home/{{ ansible_user }}/.local/share/pipx-venv/bin/pipx
    dest: /home/{{ ansible_user }}/.local/bin/pipx
    state: link

- name: Install ansible-lint
  become: false
  community.general.pipx:
    name: ansible-lint
    executable: /home/{{ ansible_user }}/.local/bin/pipx
